<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>连接工具 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">连接工具</div>

<main class="mcp-content" layout:fragment="content">
    <div class="mcp-page">
        <div class="mcp-header">
            <h3>MCP 服务器列表</h3>
            <button class="btn-add-mcp" onclick="showMcpDialog()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                添加 MCP 服务器
            </button>
        </div>

        <div class="mcp-grid" id="mcpGrid">
            <div class="mcp-empty">加载中...</div>
        </div>
    </div>

    <!-- 新增/编辑 MCP 对话框 -->
    <div class="modal-overlay" id="mcpDialog">
        <div class="modal modal-mcp">
            <div class="modal-header">
                <h3 id="mcpDialogTitle">添加 MCP 服务器</h3>
                <button class="modal-close" onclick="Modal.close('mcpDialog')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>名称 <span class="required">*</span></label>
                    <input type="text" id="mcpName" placeholder="例如：文件系统">
                </div>
                <div class="form-group">
                    <label>传输类型 <span class="required">*</span></label>
                    <select id="mcpTransportType" onchange="onTransportTypeChange()">
                        <option value="stdio">STDIO（本地进程）</option>
                        <option value="http">HTTP（远程服务）</option>
                    </select>
                </div>
                <div class="form-group" id="mcpCommandGroup">
                    <label>启动命令 <span class="required">*</span></label>
                    <input type="text" id="mcpCommand" placeholder='例如：npx -y @modelcontextprotocol/server-filesystem /path'>
                </div>
                <div class="form-group" id="mcpUrlGroup" style="display:none">
                    <label>服务地址 <span class="required">*</span></label>
                    <input type="text" id="mcpUrl" placeholder="例如：http://localhost:3001/mcp">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="mcpDescription" rows="2" placeholder="可选描述"></textarea>
                </div>
                <div class="form-group">
                    <label>扩展参数 (JSON)</label>
                    <textarea id="mcpExtParams" rows="2" placeholder='可选扩展参数，JSON格式'></textarea>
                </div>
                <input type="hidden" id="mcpId">
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="Modal.close('mcpDialog')">取消</button>
                <button class="btn-submit" onclick="saveMcpServer()">保存</button>
            </div>
        </div>
    </div>
</main>
<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/mcp.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/page/mcp.js}"></script>
</th:block>
</body>
</html>
