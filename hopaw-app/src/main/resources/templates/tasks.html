<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>定时任务管理 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">🤖 HoPaw - 定时任务管理</div>

<main layout:fragment="content" class="tasks-container">
    <div class="tasks-header">
        <h2>定时任务管理</h2>
    </div>

    <div class="tasks-card">
        <table class="tasks-table">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>Cron 表达式</th>
                    <th>状态</th>
                    <th>创建者</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody">
            </tbody>
        </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <p>暂无定时任务，点击"添加任务"按钮开始创建</p>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加任务</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskName">任务名称 *</label>
                        <input type="text" id="taskName" required placeholder="例如：日志测试">
                    </div>
                    <div class="form-group">
                        <label for="taskType">任务类型 *</label>
                        <input type="text" id="taskType" class="form-input" disabled style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="taskCron">Cron 表达式 *</label>
                        <input type="text" id="taskCron" required placeholder="例如：0 */5 * * * *">
                    </div>
                    <div class="form-group">
                        <label for="taskIdentity">创建者</label>
                        <input type="text" id="taskIdentity" placeholder="空表示系统任务">
                    </div>
                    <input type="hidden" id="taskBuiltin" value="0">
                    <div class="form-group">
                        <label>启用</label>
                        <div class="toggle-wrapper">
                            <label class="toggle">
                                <input type="checkbox" id="taskEnabled" >
                                <span class="slider"></span>
                            </label>
                            <span class="toggle-label" id="taskEnabledLabel" >关闭</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">描述</label>
                        <textarea id="taskDescription" rows="3" placeholder="任务描述"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-submit" onclick="submitTask()">保存</button>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/tasks.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/page/tasks.js}"></script>
</th:block>
</body>
</html>
