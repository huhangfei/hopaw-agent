<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/login}">
<head>
    <title>登录 · HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">登录 · HoPaw</div>

<div class="login-page" layout:fragment="content">
    <div class="login-bg">
        <div class="login-blob login-blob-1"></div>
        <div class="login-blob login-blob-2"></div>
        <div class="login-blob login-blob-3"></div>
    </div>

    <div class="login-card">
        <div class="login-brand">
            <div class="login-brand-mark">🤖</div>
            <div class="login-brand-text">
                <h1>HoPaw</h1>
                <p>选择一个用户开启你的智能体之旅</p>
            </div>
        </div>

        <div class="login-search">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input id="loginSearch" type="text" placeholder="搜索用户编号 / 名称 / 昵称" autocomplete="off"/>
        </div>

        <div class="login-account-list" id="loginAccountList">
            <div class="login-empty" th:if="${#lists.isEmpty(accounts)}">
                <p>暂无可用账户</p>
                <span>请先在系统中创建账户</span>
            </div>
            <button class="login-account" th:each="acc : ${accounts}"
                    th:attr="data-user-id=${acc.userId},data-username=${acc.username},data-nickname=${acc.nickname},data-disabled=${acc.status != null and acc.status == 0}"
                    th:classappend="${acc.status != null and acc.status == 0} ? ' disabled' : ''">
                <div class="login-avatar" th:text="${#strings.isEmpty(acc.nickname) ? T(com.agent.hopaw.util.AccountAvatar).initial(acc.username) : T(com.agent.hopaw.util.AccountAvatar).initial(acc.nickname)}">
                </div>
                <div class="login-account-info">
                    <div class="login-account-name">
                        <span class="login-nickname" th:text="${#strings.isEmpty(acc.nickname) ? acc.username : acc.nickname}"></span>
                        <span class="login-status disabled-tag" th:if="${acc.status != null and acc.status == 0}">已禁用</span>
                    </div>
                    <div class="login-account-meta">
                        <span class="login-user-id" th:text="${acc.userId}"></span>
                        <span class="login-divider" th:if="${not #strings.isEmpty(acc.username)}">·</span>
                        <span class="login-username" th:text="${acc.username}" th:if="${not #strings.isEmpty(acc.username)}"></span>
                    </div>
                    <div class="login-account-remark" th:text="${acc.remark}" th:if="${not #strings.isEmpty(acc.remark)}"></div>
                </div>
                <div class="login-account-arrow">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </div>
            </button>
        </div>

        <div class="login-footer">
            <span>每点击一个用户即自动登录</span>
            <span class="login-dot">•</span>
            <a href="/accounts" class="login-footer-link">账户管理</a>
        </div>
    </div>
</div>

<th:block layout:fragment="extraJs">
    <script th:src="@{/js/page/login.js}"></script>
</th:block>
</body>
</html>
