<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout::head('向量历史', 'vector-history.css')"></head>
<body>
    <header th:replace="fragments/layout::header('向量历史')"></header>
    <div class="main-container">
        <nav th:replace="fragments/layout::menuSidebar('vector-history')"></nav>
        <main class="vector-history-container">
            <div class="search-panel">
                <h3>向量库查询</h3>
                <div class="search-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="queryText">查询关键词 <span class="required">*</span></label>
                            <input type="text" id="queryText" class="form-input" placeholder="输入语义查询关键词">
                        </div>
                        <div class="form-group">
                            <label for="searchMemoryType">记忆类型</label>
                            <select id="searchMemoryType" class="form-input">
                                <option value="">全部</option>
                                <option value="chatHistory">聊天历史</option>
                                <option value="taskRecords">任务记录</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="searchAgentId">智能体ID</label>
                            <input type="text" id="searchAgentId" class="form-input" placeholder="不过滤则留空">
                        </div>
                        <div class="form-group">
                            <label for="searchUserId">用户ID</label>
                            <input type="text" id="searchUserId" class="form-input" placeholder="不过滤则留空">
                        </div>
                        <div class="form-group">
                            <label for="searchMaxResults">最大条数</label>
                            <input type="number" id="searchMaxResults" class="form-input" value="20" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label for="searchMinScore">最低相似度</label>
                            <input type="number" id="searchMinScore" class="form-input" value="0.0" min="0" max="1" step="0.01">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="doSearch()">🔍 查询</button>
                        <button class="btn btn-secondary" onclick="clearResults()">清空结果</button>
                    </div>
                </div>
            </div>

            <div class="results-panel">
                <div class="panel-header">
                    <span>查询结果</span>
                    <span id="resultCount" class="result-count"></span>
                </div>
                <div class="table-container" id="resultsContainer">
                    <div class="empty-state" id="emptyState">请输入查询关键词后点击查询</div>
                    <table class="results-table" id="resultsTable" style="display:none;">
                        <thead>
                            <tr>
                                <th style="width:60px;">#</th>
                                <th style="width:80px;">记忆类型</th>
                                <th style="width:80px;">智能体ID</th>
                                <th>内容</th>
                                <th style="width:70px;">相似度</th>
                                <th style="width:120px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="confirmModal" style="display:none;">
        <div class="modal-dialog">
            <div class="modal-header">确认删除</div>
            <div class="modal-body" id="confirmMessage"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <div th:replace="fragments/layout::toastContainer"></div>
    <th:block th:replace="fragments/layout::commonScripts('vector-history.js')"></th:block>
</body>
</html>
