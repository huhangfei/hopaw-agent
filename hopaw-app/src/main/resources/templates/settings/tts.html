<th:block th:fragment="content" xmlns:th="http://www.thymeleaf.org">
<div class="settings-panel active" id="tab-tts">
    <div class="settings-form" style="max-width:900px;">
        <div class="tts-list-header">
            <h3>TTS 语音配置</h3>
            <button class="btn-add-tts" onclick="showTtsForm()">+ 添加配置</button>
        </div>

        <div class="tts-table-wrap">
            <table class="tts-table" id="ttsTable">
                <thead>
                    <tr>
                        <th>配置名称</th>
                        <th>厂商</th>
                        <th>编号</th>
                        <th>配置</th>
                        <th style="width:80px;">状态</th>
                        <th style="width:120px;">操作</th>
                    </tr>
                </thead>
                <tbody id="ttsTableBody">
                    <tr id="ttsEmptyRow">
                        <td colspan="6" class="tts-empty">暂无 TTS 配置，点击"添加配置"开始</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tts-form" id="ttsEditForm" style="display:none;">
            <div class="tts-form-divider"></div>
            <h4 class="tts-form-title" id="ttsFormTitle">添加 TTS 配置</h4>
            <input type="hidden" id="ttsEditId">

            <div class="form-group">
                <label for="ttsVendorSelect">TTS 厂商</label>
                <select id="ttsVendorSelect" class="settings-input" onchange="onTtsVendorChange()">
                    <option value="">选择厂商</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ttsConfigName">配置名称</label>
                <input type="text" id="ttsConfigName" class="settings-input" maxlength="50" placeholder="例如：生产环境、测试账号A">
                <p class="form-hint">自定义名称，方便区分同厂商的多条配置</p>
            </div>

            <div class="form-group">
                <label for="ttsConfigJson">厂商配置（JSON）</label>
                <textarea id="ttsConfigJson" class="settings-input tts-json-input" rows="6" placeholder='{"appId":"xxx","accessToken":"xxx"}'></textarea>
                <p class="form-hint">火山引擎: {"appId":"xxx","accessToken":"xxx","cluster":"volcano_tts"}<br>阿里云: {"accessKeyId":"xxx","accessKeySecret":"xxx","appKey":"xxx"}</p>
            </div>

            <div class="form-group">
                <label class="switch-row">
                    <span class="switch-label">启用</span>
                    <label class="switch">
                        <input type="checkbox" id="ttsEnabled" checked>
                        <span class="slider"></span>
                    </label>
                </label>
            </div>

            <div class="tts-form-actions">
                <button class="btn-save-settings" onclick="saveTtsForm()">保存</button>
                <button class="btn-cancel" onclick="hideTtsForm()">取消</button>
            </div>
        </div>
    </div>
</div>
</th:block>
