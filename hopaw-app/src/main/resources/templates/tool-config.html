<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout::head('工具配置 - HoPaw', 'tool-config.css')"></head>
<body>
    <header th:replace="fragments/layout::header('🤖 HoPaw - 工具配置')"></header>

    <div class="main-container">
        <nav th:replace="fragments/layout::menuSidebar('tools')"></nav>

        <div class="tool-config-container">
            <div th:if="${success}" class="toast-success" th:text="${success}"></div>
            <div th:if="${error}" class="toast-error" th:text="${error}"></div>

            <div class="config-header">
                <a href="/tools" class="btn-back">← 返回工具列表</a>
                <h2 th:text="|${config.toolName} 配置|"></h2>
                <p class="config-desc" th:text="${config.toolDescription}"></p>
            </div>

            <form th:action="@{|/tool-config/${toolName}|}" method="post" class="config-form" id="configForm" onsubmit="return validateForm(event)">
                <div th:each="item : ${config.configItems}" class="config-item">
                    <div class="config-item-header">
                        <label th:text="${item.label}" class="config-label">
                            <span th:if="${item.validation != null && item.validation.required}" class="required">*</span>
                        </label>
                        <span th:if="${item.description}" class="config-hint" th:text="${item.description}"></span>
                    </div>

                    <div th:switch="${item.type.name()}" class="config-input-container">
                        <input th:case="'TEXT_SINGLE'"
                               type="text"
                               th:name="|config_${item.key}|"
                               th:value="${config.values[item.key]}"
                               th:required="${item.validation != null && item.validation.required}"
                               th:minlength="${item.validation != null ? item.validation.minLength : null}"
                               th:maxlength="${item.validation != null ? item.validation.maxLength : null}"
                               th:pattern="${item.validation != null ? item.validation.regex : null}"
                               th:title="${item.validation != null ? item.validation.regexMessage : null}"
                               class="config-input"
                               th:data-key="${item.key}">

                        <textarea th:case="'TEXT_AREA'"
                                  th:name="|config_${item.key}|"
                                  class="config-textarea"
                                  th:required="${item.validation != null && item.validation.required}"
                                  th:minlength="${item.validation != null ? item.validation.minLength : null}"
                                  th:maxlength="${item.validation != null ? item.validation.maxLength : null}"
                                  th:data-key="${item.key}"
                                  th:text="${config.values[item.key]}"></textarea>

                        <div th:case="'TEXT_MULTI'" class="config-multi-input" th:data-key="${item.key}" th:data-is-multi="true">
                            <th:block th:with="savedValues=${config.values[item.key] != null && !config.values[item.key].isEmpty() ? config.values[item.key].split(',') : {''}}">
                                <div th:each="value, stat : ${savedValues}" class="multi-input-row">
                                    <input type="text"
                                           th:name="|config_${item.key}_${stat.index}|"
                                           th:value="${value}"
                                           th:minlength="${item.validation != null ? item.validation.minLength : null}"
                                           th:maxlength="${item.validation != null ? item.validation.maxLength : null}"
                                           th:pattern="${item.validation != null ? item.validation.regex : null}"
                                           th:title="${item.validation != null ? item.validation.regexMessage : null}"
                                           class="config-input multi-input-field">
                                    <button type="button" class="btn-remove-row" onclick="removeMultiRow(this)" th:if="${stat.index > 0}">-</button>
                                    <button type="button" class="btn-add-row" onclick="addMultiRow(this)" th:if="${stat.last}">+</button>
                                </div>
                            </th:block>
                        </div>

                        <input th:case="'TEXT_PASSWORD'"
                               type="password"
                               th:name="|config_${item.key}|"
                               th:value="${config.values[item.key]}"
                               th:required="${item.validation != null && item.validation.required}"
                               th:minlength="${item.validation != null ? item.validation.minLength : null}"
                               th:maxlength="${item.validation != null ? item.validation.maxLength : null}"
                               th:pattern="${item.validation != null ? item.validation.regex : null}"
                               th:title="${item.validation != null ? item.validation.regexMessage : null}"
                               class="config-input"
                               th:data-key="${item.key}">

                        <div th:case="'TEXT_PASSWORD_MULTI'" class="config-multi-input" th:data-key="${item.key}" th:data-is-multi="true">
                            <th:block th:with="savedValues=${config.values[item.key] != null && !config.values[item.key].isEmpty() ? config.values[item.key].split(',') : {''}}">
                                <div th:each="value, stat : ${savedValues}" class="multi-input-row">
                                    <input type="password"
                                           th:name="|config_${item.key}_${stat.index}|"
                                           th:value="${value}"
                                           th:minlength="${item.validation != null ? item.validation.minLength : null}"
                                           th:maxlength="${item.validation != null ? item.validation.maxLength : null}"
                                           th:pattern="${item.validation != null ? item.validation.regex : null}"
                                           th:title="${item.validation != null ? item.validation.regexMessage : null}"
                                           class="config-input multi-input-field">
                                    <button type="button" class="btn-remove-row" onclick="removeMultiRow(this)" th:if="${stat.index > 0}">-</button>
                                    <button type="button" class="btn-add-row" onclick="addMultiRow(this)" th:if="${stat.last}">+</button>
                                </div>
                            </th:block>
                        </div>

                        <select th:case="'SELECT'"
                                th:name="|config_${item.key}|"
                                class="config-select"
                                th:required="${item.validation != null && item.validation.required}"
                                th:data-key="${item.key}">
                            <option th:each="option : ${item.options}"
                                    th:value="${option.value}"
                                    th:text="${option.label}"
                                    th:selected="${config.values[item.key] == option.value}"></option>
                        </select>

                        <select th:case="'SELECT_MULTI'"
                                th:name="|config_${item.key}[]|"
                                multiple
                                class="config-select config-select-multi"
                                th:data-key="${item.key}">
                            <option th:each="option : ${item.options}"
                                    th:value="${option.value}"
                                    th:text="${option.label}"
                                    th:selected="${#strings.contains(#strings.toString(config.values[item.key]), option.value)}"></option>
                        </select>

                        <div th:case="'RADIO'" class="config-radio-group" th:data-key="${item.key}">
                            <div th:each="option, optionStat : ${item.options}" class="config-radio-item">
                                <input type="radio"
                                       th:id="|config_${item.key}_${optionStat.index}|"
                                       th:name="|config_${item.key}|"
                                       th:value="${option.value}"
                                       th:checked="${config.values[item.key] == option.value}"
                                       th:required="${item.validation != null && item.validation.required}">
                                <label th:for="|config_${item.key}_${optionStat.index}|"
                                       th:text="${option.label}"></label>
                            </div>
                        </div>

                        <div th:case="'CHECKBOX'" class="config-checkbox-group" th:data-key="${item.key}">
                            <div th:each="option, optionStat : ${item.options}" class="config-checkbox-item">
                                <input type="checkbox"
                                       th:id="|config_${item.key}_${optionStat.index}|"
                                       th:name="|config_${item.key}_${optionStat.index}|"
                                       th:value="${option.value}"
                                       th:checked="${#strings.contains(#strings.toString(config.values[item.key]), option.value)}">
                                <label th:for="|config_${item.key}_${optionStat.index}|"
                                       th:text="${option.label}"></label>
                            </div>
                        </div>
                    </div>
                    <div class="validation-error" th:id="'error-' + ${item.key}"></div>
                </div>

                <div th:if="${#lists.isEmpty(config.configItems)}" class="config-empty">
                    <p>该工具暂无可用配置项</p>
                </div>

                <div class="config-actions" th:if="${not #lists.isEmpty(config.configItems)}">
                    <button type="submit" class="btn-primary">保存配置</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="fragments/layout::toastContainer"></div>
    <th:block th:replace="fragments/layout::commonScripts('tool-config.js')"></th:block>
</body>
</html>
