<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout::head('Token 用量统计', 'token-usage.css')"></head>
<body>
    <header th:replace="fragments/layout::header('🤖 HoPaw - Token 用量统计')"></header>

    <div class="main-container">
        <nav th:replace="fragments/layout::menuSidebar('token-usage')"></nav>

        <main class="usage-container">
            <div class="usage-header">
                <h2>Token 用量统计</h2>
            </div>

            <div class="filter-card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="startTime">开始时间</label>
                        <input type="datetime-local" id="startTime">
                    </div>
                    <div class="filter-group">
                        <label for="endTime">结束时间</label>
                        <input type="datetime-local" id="endTime">
                    </div>
                    <div class="filter-group">
                        <label for="filterUser">用户</label>
                        <select id="filterUser">
                            <option value="">全部</option>
                            <option value="user1">user1</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterAgent">智能体</label>
                        <select id="filterAgent">
                            <option value="">全部</option>
                            <option th:each="a : ${agents}" th:value="${a.id}" th:text="${a.name}"></option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterModel">模型名称</label>
                        <input type="text" id="filterModel" placeholder="例如: claude-opus-4-7">
                    </div>
                    <div class="filter-group">
                        <label for="filterSource">来源</label>
                        <select id="filterSource">
                            <option value="">全部</option>
                            <option value="chat">会话</option>
                            <option value="model-test">模型测试</option>
                            <option value="memory-organize">记忆整理</option>
                            <option value="agentTask">智能体定时任务</option>
                        </select>
                    </div>
                    <button class="btn-query" onclick="queryData()">查询</button>
                </div>
            </div>

            <div class="summary-cards" id="summaryCards">
                <div class="summary-card">
                    <div class="summary-label">请求次数</div>
                    <div class="summary-value" id="summaryCount">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">输入 Tokens</div>
                    <div class="summary-value" id="summaryInput">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">输出 Tokens</div>
                    <div class="summary-value" id="summaryOutput">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">总 Tokens</div>
                    <div class="summary-value total" id="summaryTotal">0</div>
                </div>
            </div>

            <div class="chart-card" id="chartCard">
                <div class="chart-header">
                    <h3>每日趋势</h3>
                </div>
                <div class="chart-wrapper">
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="chart-empty" id="chartEmpty" style="display:none;">
                    <p>暂无数据</p>
                </div>
            </div>

            <div class="usage-card">
                <table class="usage-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>用户</th>
                            <th>智能体</th>
                            <th>模型</th>
                            <th>来源</th>
                            <th>输入 Tokens</th>
                            <th>输出 Tokens</th>
                            <th>总 Tokens</th>
                        </tr>
                    </thead>
                    <tbody id="usageTableBody">
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display:none;">
                <p>暂无数据，请选择时间范围后查询</p>
            </div>

            <div class="pagination" id="pagination" style="display:none;">
                <button class="page-btn" id="prevPage" onclick="goPage(currentPage - 1)">上一页</button>
                <span class="page-info" id="pageInfo"></span>
                <button class="page-btn" id="nextPage" onclick="goPage(currentPage + 1)">下一页</button>
            </div>
        </main>
    </div>

    <div th:replace="fragments/layout::toastContainer"></div>
    <script th:inline="javascript">
        var AGENTS = /*[[${agents}]]*/ [];
    </script>
    <script th:src="@{/js/chart.umd.min.js}"></script>
    <th:block th:replace="fragments/layout::commonScripts('token-usage.js')"></th:block>
</body>
</html>
