# Server Configuration
server.port=8080
spring.jackson.time-zone=Asia/Shanghai
spring.profiles.active=dev
# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Multipart File Upload
spring.servlet.multipart.max-file-size=10240MB
spring.servlet.multipart.max-request-size=1024MB

# MyBatis - 让所有 profile 都能扫描到各模块的 mapper XML
# 使用 classpath*:** 通配符匹配 classpath 中所有 mapper 路径
mybatis.mapper-locations=classpath*:mapper/**/*Mapper.xml
mybatis.type-aliases-package=com.agent.hopaw.infra.model.entity,com.agent.hopaw.avatar.entity

