<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="#8B5CF6"/>

  <!-- 拼图插槽：左上 -->
  <rect x="20" y="20" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="50" y="20" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="20" y="50" width="26" height="26" rx="4" fill="white" opacity="0.95"/>

  <!-- 拼图凸出块：右下，象征"插件插入" -->
  <path d="M50 50 L80 50 L80 56 C 80 60, 84 60, 84 64 C 84 68, 80 68, 80 72 L 80 80 L 50 80 Z"
        fill="#FBBF24" stroke="white" stroke-width="2"/>

  <!-- 拼图中心圆点 -->
  <circle cx="33" cy="33" r="3" fill="#8B5CF6"/>
  <circle cx="63" cy="33" r="3" fill="#8B5CF6"/>
  <circle cx="33" cy="63" r="3" fill="#8B5CF6"/>
</svg>