# Development Environment Configuration
# SQLite Configuration
spring.datasource.url=jdbc:sqlite:agent.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# MyBatis Configuration - 使用 classpath* 模式扫描所有模块的 mapper XML（含 hopaw-avatar 等子模块 jar 内）
mybatis.mapper-locations=classpath*:mapper/AvatarConfigMapper.xml,classpath*:mapper/AccountMapper.xml,classpath*:mapper/AgentMapper.xml,classpath*:mapper/AiModelMapper.xml,classpath*:mapper/AiModelProviderMapper.xml,classpath*:mapper/ChatHistoryMapper.xml,classpath*:mapper/ChatMemoryMapper.xml,classpath*:mapper/ChatMemoryObsoleteMapper.xml,classpath*:mapper/ChatSessionMapper.xml,classpath*:mapper/LongTermMemoryMapper.xml,classpath*:mapper/ScheduledTaskMapper.xml,classpath*:mapper/SysConfigMapper.xml,classpath*:mapper/TokenUsageMapper.xml,classpath*:mapper/UserConfigMapper.xml
mybatis.type-aliases-package=com.agent.hopaw.infra.model.entity,com.agent.hopaw.avatar.entity

# Plugin Configuration
agent.plugin.dir=plugins

# Logging
logging.level.com.agent.hopaw=DEBUG
logging.level.org.springframework=WARN
