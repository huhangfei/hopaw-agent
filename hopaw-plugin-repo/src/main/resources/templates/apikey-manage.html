<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key 管理 - 插件仓库</title>
    <link rel="stylesheet" th:href="@{/css/plugin-repo.css}">
    <style>
        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 32px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 32px;
            height: 56px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand { font-weight: 700; color: var(--primary); font-size: 16px; text-decoration: none; }
        .nav-links { display: flex; gap: 8px; flex: 1; }
        .nav-links a {
            padding: 6px 14px; font-size: 13px; text-decoration: none;
            color: var(--text-secondary); border-radius: 6px; transition: all .2s;
        }
        .nav-links a:hover, .nav-links a.active { background: var(--primary-light); color: var(--primary); }
        .nav-user {
            display: flex; align-items: center; gap: 12px;
            font-size: 13px; color: var(--text-secondary);
        }
        .nav-user a { color: #dc2626; text-decoration: none; font-size: 12px; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; font-size: 13px; font-weight: 600;
            color: #fff; background: var(--primary); border: none;
            border-radius: 8px; cursor: pointer;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-sm {
            padding: 4px 10px; font-size: 11px; font-weight: 600;
            border-radius: 6px; cursor: pointer; border: none;
        }
        .btn-lock { color: #d97706; background: #fffbeb; }
        .btn-unlock { color: #059669; background: #ecfdf5; }
        .btn-danger { color: #dc2626; background: #fef2f2; }
        .btn-copy { color: #0891b2; background: #ecfeff; }
        .btn-copy:hover { background: #cffafe; }
        .data-table {
            width: 100%; border-collapse: collapse; background: var(--card-bg);
            border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
        }
        .data-table th {
            text-align: left; padding: 12px 16px;
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 12px 16px; font-size: 13px;
            border-bottom: 1px solid var(--border); vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .status-locked { color: #dc2626; font-weight: 600; }
        .status-active { color: #059669; font-weight: 600; }
        .actions { display: flex; gap: 4px; }
        .key-value {
            font-family: monospace;
            font-size: 12px;
            color: var(--text);
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel {
            padding: 8px 16px; font-size: 13px; font-weight: 500;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; color: var(--text-secondary);
        }
        .empty-keys {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .status-expired { color: #dc2626; font-weight: 600; }
        .status-expiring { color: #d97706; font-weight: 600; }
        .expires-tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 6px;
        }
        .expires-tag.never {
            background: #f3f4f6;
            color: var(--text-muted);
        }
        .expires-tag.soon {
            background: #fffbeb;
            color: #d97706;
        }
        .expires-tag.expired {
            background: #fef2f2;
            color: #dc2626;
        }
        .expires-tag.normal {
            background: #ecfdf5;
            color: #059669;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-row label {
            font-size: 13px;
            color: var(--text-secondary);
            min-width: 60px;
        }
        input[type="datetime-local"] {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
        }
        input[type="datetime-local"]:focus {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a th:href="@{/plugin-repo/}" class="nav-brand">插件仓库</a>
        <div class="nav-links">
            <a th:href="@{/plugin-repo/}">插件列表</a>
            <a th:if="${isAdmin}" th:href="@{/plugin-repo/admin/users}">用户管理</a>
            <a th:href="@{/plugin-repo/keys}" class="active">API Keys</a>
            <a th:href="@{/plugin-repo/docs}">接口说明</a>
        </div>
        <div class="nav-user" th:if="${currentUser != null}">
            <span th:text="${currentUser.displayName}">admin</span>
            <a href="javascript:void(0)" th:onclick="'document.getElementById(\'logoutForm\').submit()'">退出</a>
            <form id="logoutForm" th:action="@{/plugin-repo/auth/logout}" method="post" style="display:none;"></form>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>API Key 管理</h1>
            <button class="btn-primary" onclick="showCreateModal()">+ 创建 Key</button>
        </div>

        <table class="data-table" th:if="${keys != null and !keys.isEmpty()}">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>Key</th>
                    <th th:if="${isAdmin}">所属用户</th>
                    <th>状态</th>
                    <th>过期时间</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="key : ${keys}" class="key-row"
                    th:attr="data-id=${key.id},data-keyvalue=${key.keyValue},data-name=${key.name}">
                    <td th:text="${key.name}">Default Key</td>
                    <td><span class="key-value" th:text="${key.keyValue}">haw_xxx</span></td>
                    <td th:if="${isAdmin}" th:text="${key.username}">admin</td>
                    <td>
                        <span th:class="${key.locked} ? 'status-locked' : (${key.expired} ? 'status-expired' : (${key.expiringSoon} ? 'status-expiring' : 'status-active'))"
                              th:text="${key.locked} ? '已锁定' : (${key.expired} ? '已过期' : (${key.expiringSoon} ? '即将过期' : '正常'))">正常</span>
                    </td>
                    <td>
                        <th:block th:if="${key.expiresAt != null}">
                            <span th:text="${key.expiresAtStr}">2025-01-01 00:00</span>
                        </th:block>
                        <th:block th:if="${key.expiresAt == null}">
                            <span class="expires-tag never">永不过期</span>
                        </th:block>
                    </td>
                    <td th:text="${key.createdAt}">2024-01-01</td>
                    <td>
                        <div class="actions">
                            <button class="btn-sm btn-copy" onclick="copyKey(this)">复制</button>
                            <button th:if="${isAdmin and key.locked}" class="btn-sm btn-unlock" onclick="toggleLock(this)">解锁</button>
                            <button th:if="${isAdmin and !key.locked}" class="btn-sm btn-lock" onclick="toggleLock(this)">锁定</button>
                            <button class="btn-sm btn-danger" onclick="deleteKey(this)">删除</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="empty-keys" th:if="${keys == null or keys.isEmpty()}">
            暂无 API Key，点击上方按钮创建
        </div>
    </div>

    <div class="modal-overlay" id="createModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h2>创建 API Key</h2>
                <button class="modal-close" onclick="hideCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>名称</label>
                    <input type="text" id="keyName" class="search-input" placeholder="为这个Key取个名字" style="width:100%;box-sizing:border-box;">
                </div>
                <div class="form-group">
                    <div class="form-row">
                        <label>过期时间</label>
                        <input type="datetime-local" id="keyExpiresAt">
                    </div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:72px;">不设置则永不过期</div>
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="hideCreateModal()">取消</button>
                    <button class="btn-primary" onclick="createKey()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showCreateModal() {
            document.getElementById('keyName').value = '';
            document.getElementById('keyExpiresAt').value = '';
            document.getElementById('createModal').style.display = '';
        }

        function hideCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        function createKey() {
            var name = document.getElementById('keyName').value || 'API Key';
            var expiresAt = document.getElementById('keyExpiresAt').value || null;
            var body = {name: name};
            if (expiresAt) {
                body.expiresAt = expiresAt;
            }
            fetch('/plugin-repo/keys/api/keys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.type === 'success') {
                    alert('创建成功');
                    location.reload();
                } else {
                    alert(d.message);
                }
            });
        }

        function getRowData(el) {
            var row = el.closest('tr');
            return {
                id: row.getAttribute('data-id'),
                keyValue: row.getAttribute('data-keyvalue'),
                name: row.getAttribute('data-name')
            };
        }

        function copyKey(el) {
            var d = getRowData(el);
            navigator.clipboard.writeText(d.keyValue).then(function() {
                alert('已复制到剪贴板');
            }).catch(function() {
                prompt('请手动复制：', d.keyValue);
            });
        }

        function toggleLock(el) {
            var d = getRowData(el);
            if (!confirm('确定要切换Key锁定状态吗？')) return;
            fetch('/plugin-repo/keys/api/keys/' + d.id + '/lock', { method: 'PUT' })
                .then(function(r) { return r.json(); }).then(function(d) {
                    if (d.type === 'success') location.reload();
                    else alert(d.message);
                });
        }

        function deleteKey(el) {
            var d = getRowData(el);
            if (!confirm('确定要删除 Key "' + d.name + '" 吗？')) return;
            fetch('/plugin-repo/keys/api/keys/' + d.id, { method: 'DELETE' })
                .then(function(r) { return r.json(); }).then(function(d) {
                    if (d.type === 'success') location.reload();
                    else alert(d.message);
                });
        }

        document.getElementById('createModal').addEventListener('click', function(e) {
            if (e.target === this) hideCreateModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') hideCreateModal();
        });
    </script>
</body>
</html>
