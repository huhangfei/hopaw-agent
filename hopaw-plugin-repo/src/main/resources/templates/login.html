<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 插件仓库</title>
    <link rel="stylesheet" th:href="@{/css/plugin-repo.css}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
        }
        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
            color: #1f2937;
        }
        .login-card .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            outline: none;
            transition: border-color .2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-login:hover {
            opacity: .9;
        }
        .login-error {
            background: #fef2f2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .login-logout {
            background: #ecfdf5;
            color: #065f46;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>插件仓库</h1>
            <p class="login-subtitle">Plugin Repository</p>
            <div th:if="${param.error != null}" class="login-error">用户名或密码错误</div>
            <div th:if="${param.logout != null}" class="login-logout">您已安全退出</div>
            <form th:action="@{/plugin-repo/auth/login}" method="post">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">登 录</button>
            </form>
        </div>
    </div>
</body>
</html>
