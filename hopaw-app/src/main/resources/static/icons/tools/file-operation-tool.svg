<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="30" fill="url(#circleGrad)"/>
  
  <!-- 文档图标 -->
  <g filter="url(#innerShadow)">
    <!-- 主文档 -->
    <path d="M20 16 L36 16 L44 24 L44 48 Q44 50 42 50 L22 50 Q20 50 20 48 Z" fill="white"/>
    <!-- 文档折叠角 -->
    <path d="M36 16 L36 24 L44 24 Z" fill="#e8e8e8"/>
    <!-- 文件内容线 -->
    <rect x="26" y="28" width="12" height="2" rx="1" fill="#667eea" opacity="0.7"/>
    <rect x="26" y="33" width="10" height="2" rx="1" fill="#667eea" opacity="0.5"/>
    <rect x="26" y="38" width="8" height="2" rx="1" fill="#667eea" opacity="0.4"/>
  </g>
  
  <!-- 齿轮操作符号 -->
  <g transform="translate(44, 44)">
    <circle cx="0" cy="0" r="10" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="url(#circleGrad)"/>
    <!-- 齿轮齿 -->
    <g stroke="url(#circleGrad)" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-9" x2="0" y2="-6"/>
      <line x1="0" y1="9" x2="0" y2="6"/>
      <line x1="-9" y1="0" x2="-6" y2="0"/>
      <line x1="9" y1="0" x2="6" y2="0"/>
    </g>
  </g>
</svg>