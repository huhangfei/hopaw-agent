<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>插件升级 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">🔄 HoPaw - 插件升级</div>

<div class="upgrade-page" layout:fragment="content">
    <div class="upgrade-header">
        <h2>插件升级/安装</h2>
        <button class="btn-back" onclick="history.back()">返回</button>
    </div>

    <div class="upgrade-card">
        <div class="upgrade-info">
            <div class="info-row">
                <span class="info-label">工具名称：</span>
                <span class="info-value" th:text="${toolName}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">当前版本：</span>
                <span class="info-value" id="currentVersion" th:text="${currentVersion != '' ? currentVersion : '未安装'}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">插件文件：</span>
                <span class="info-value" id="jarFileName" th:text="${jarFileName != '' ? jarFileName : '-'}"></span>
            </div>
        </div>

        <div class="upgrade-url-section">
            <label class="upgrade-url-label" for="checkUrl">检测接口地址</label>
            <div class="upgrade-url-input">
                <input type="text" id="checkUrl" name="checkUrl" th:value="${defaultUpdateUrl}" placeholder="输入插件检测接口地址">
                <button class="btn-check" id="btnCheck" onclick="checkUpdate()">检测</button>
            </div>
        </div>

        <div class="upgrade-result" id="upgradeResult" style="display: none;">
            <div class="result-header">
                <span class="result-title">检测结果</span>
                <span class="result-status" id="resultStatus"></span>
            </div>
            <div class="result-info" id="resultInfo">
                <div class="result-row">
                    <span class="result-label">最新版本：</span>
                    <span class="result-value" id="newVersion"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">文件名：</span>
                    <span class="result-value" id="fileName"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">文件大小：</span>
                    <span class="result-value" id="fileSize"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">下载地址：</span>
                    <span class="result-value download-url" id="downloadUrl"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">SHA256：</span>
                    <span class="result-value hash-value" id="sha256Hash"></span>
                </div>
            </div>
            <div class="result-action">
                <button class="btn-install" id="btnInstall" onclick="installOrUpgrade()"></button>
            </div>
        </div>

        <div class="upgrade-loading" id="upgradeLoading" style="display: none;">
            <div class="loading-spinner"></div>
            <span id="loadingText">处理中...</span>
        </div>

        <div class="upgrade-error" id="upgradeError" style="display: none;">
            <span id="errorText"></span>
        </div>
    </div>
</div>

<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/tool-upgrade.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/tool-upgrade.js}"></script>
</th:block>
</body>
</html>
