    <link rel="stylesheet" th:href="@{/css/dark-theme.css}">
    <th:block layout:fragment="extraCss"></th:block>
</head>
<body th:class="${currentTheme == 'dark' ? 'dark-theme' : ''}">

                    <path class="sun-path" th:style="${currentTheme == 'dark' ? 'display: none;' : 'display: block;'}" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .38-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .38-.39.39-1.03 0-1.41l-1.06-1.06zM20 11h-2c-.55 0-1 .45-1 1s.45 1 1 1h2c.55 0 1-.45 1-1s-.45-1-1-1zM4 11H2c-.55 0-1 .45-1 1s.45 1 1 1h2c.55 0 1-.45 1-1s-.45-1-1-1zM12 16.99c-.38 0-.69-.28-.72-.66-.02-.24.16-.48.38-.64l2.03-1.51c.37-.28.48-.76.21-1.12-.27-.36-.76-.47-1.12-.21l-1.37 1.02c-.56.42-1.31.42-1.87 0l-1.37-1.02c-.36-.27-.85-.16-1.12.21-.27.36-.16.85.21 1.12l2.03 1.51c.22.16.4.4.38.64-.03.38-.34.66-.72.66z"/>

                </svg>
            </button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <nav class="menu-sidebar" id="mainMenu" th:classappend="${menuCollapsed} ? 'collapsed' : ''">

            </a>
            <a href="/agents" class="menu-btn" th:classappend="${activePage == 'agents' ? 'active' : ''}" title="智能体管理">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="7" width="18" height="13" rx="2"/>
                    <circle cx="8" cy="12" r="1.5" fill="currentColor"/>

                    <path d="M12 18h.01"/>
                    <line x1="9" y1="4" x2="15" y2="4"/>
                    <circle cx="12" cy="3" r="1" fill="currentColor"/>

            </a>
            <a href="/models" class="menu-btn" th:classappend="${activePage == 'models' ? 'active' : ''}" title="模型管理">

                    <rect x="2" y="2" width="9" height="9" rx="2"/>
                    <rect x="13" y="2" width="9" height="9" rx="2"/>
                    <rect x="2" y="13" width="9" height="9" rx="2"/>

                </svg>
                <span class="menu-label">模型管理</span>
            </a>
            <div class="menu-group" id="menuGroupMemory">

                        <path d="M9 18v2c0 .6.4 1 1 1h4c.6 0 1-.4 1-1v-2"/>
                        <line x1="9" y1="18.5" x2="15" y2="18.5"/>
                        <line x1="9" y1="20" x2="15" y2="20"/>
                        <path d="M7 6.5c.5-.8 1.3-1.3 2.2-1.3"/>
                        <path d="M6.8 8.5c.4-.5 1-1 1.7-1.2"/>
                        <path d="M7.2 10.5c.4-.3.9-.5 1.5-.5"/>
                        <path d="M17 6.5c-.5-.8-1.3-1.3-2.2-1.3"/>
                        <path d="M17.2 8.5c-.4-.5-1-1-1.7-1.2"/>
                        <path d="M16.8 10.5c-.4-.3-.9-.5-1.5-.5"/>
                        <path d="M12 4.5v7.5"/>
                    </svg>
                    <span class="menu-label">记忆</span>
                </button>
                <div class="menu-sub-items">
                    <a href="/memory-manage" class="menu-btn menu-sub-item" th:classappend="${activePage == 'memory-manage' ? 'active' : ''}" title="记忆管理">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 2.5C6.5 2.5 4.5 4.5 4.5 7c0 2.3 1.3 4.2 3.2 5.1.3.1.5.4.5.7V15h2v1.5h-1.5V18h6.6v-1.5H13.8V15h2v-2.2c0-.3.2-.6.5-.7 1.9-.9 3.2-2.8 3.2-5.1 0-2.5-2-4.5-4.5-4.5H9z" fill="currentColor" fill-opacity="0.15"/>
                            <path d="M9 18v2c0 .6.4 1 1 1h4c.6 0 1-.4 1-1v-2"/>
                            <line x1="9" y1="18.5" x2="15" y2="18.5"/>
                            <line x1="9" y1="20" x2="15" y2="20"/>
                            <path d="M7 6.5c.5-.8 1.3-1.3 2.2-1.3"/>
                            <path d="M6.8 8.5c.4-.5 1-1 1.7-1.2"/>
                            <path d="M7.2 10.5c.4-.3.9-.5 1.5-.5"/>
                            <path d="M17 6.5c-.5-.8-1.3-1.3-2.2-1.3"/>
                            <path d="M17.2 8.5c-.4-.5-1-1-1.7-1.2"/>
                            <path d="M16.8 10.5c-.4-.3-.9-.5-1.5-.5"/>
                            <path d="M12 4.5v7.5"/>
                        </svg>
                        <span class="menu-label">记忆管理</span>
                    </a>
                    <a href="/vector-history" class="menu-btn menu-sub-item" th:classappend="${activePage == 'vector-history' ? 'active' : ''}" title="向量历史">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="5" r="2"/>
                            <circle cx="5" cy="12" r="2"/>
                            <circle cx="19" cy="12" r="2"/>
                            <circle cx="8" cy="19" r="2"/>
                            <circle cx="16" cy="19" r="2"/>
                            <line x1="12" y1="7" x2="5" y2="10"/>
                            <line x1="12" y1="7" x2="19" y2="10"/>
                            <line x1="7" y1="12" x2="17" y2="12"/>
                            <line x1="5" y1="13" x2="8" y2="17"/>
                            <line x1="19" y1="13" x2="16" y2="17"/>
                            <line x1="10" y1="19" x2="14" y2="19"/>

                    </a>

            </div>

            <a href="/tools" class="menu-btn" th:classappend="${activePage == 'tools' ? 'active' : ''}" title="工具管理">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
                <span class="menu-label">工具管理</span>
            </a>
            <a href="/tasks" class="menu-btn" th:classappend="${activePage == 'tasks' ? 'active' : ''}" title="定时任务">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="menu-label">定时任务</span>
            </a>
            <a href="/token-usage" class="menu-btn" th:classappend="${activePage == 'token-usage' ? 'active' : ''}" title="Token 使用">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span class="menu-label">Token 使用</span>
            </a>
            <a href="/skills" class="menu-btn" th:classappend="${activePage == 'skills' ? 'active' : ''}" title="技能管理">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <span class="menu-label">技能管理</span>
            </a>


            <a href="/settings" class="menu-btn" th:classappend="${activePage == 'settings' ? 'active' : ''}" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span class="menu-label">设置</span>
            </a>

            <div class="menu-collapse-wrapper">
                <button class="menu-collapse-btn" th:title="${menuCollapsed ? '展开菜单' : '收缩菜单'}" onclick="toggleMenu()">
                    <svg class="collapse-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path th:if="${!menuCollapsed}" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                        <path th:if="${menuCollapsed}" d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
                    </svg>
                    <span class="menu-label" th:text="${menuCollapsed ? '展开菜单' : '收缩菜单'}">收缩菜单</span>
                </button>
            </div>
        </nav>
        <main layout:fragment="content"></main>
    </div>


    <div id="toast-container" class="toast-container"></div>

    <script>
        function setMenuCookie(collapsed) {
            var expires = new Date();
            expires.setFullYear(expires.getFullYear() + 1);
            document.cookie = 'menuCollapsed=' + collapsed + ';path=/;expires=' + expires.toUTCString() + ';SameSite=Lax';
        }

        function toggleMenu() {
            var menu = document.getElementById('mainMenu');
            menu.classList.add('with-anim');
            menu.classList.toggle('collapsed');
            updateMenuUI(menu);
            setMenuCookie(menu.classList.contains('collapsed'));
        }

        function updateMenuUI(menu) {
            var btn = menu.querySelector('.menu-collapse-btn');
            var icon = btn.querySelector('.collapse-icon');
            var label = btn.querySelector('.menu-label');
            if (menu.classList.contains('collapsed')) {
                btn.title = '展开菜单';
                label.textContent = '展开菜单';
                icon.innerHTML = '<path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>';
            } else {
                btn.title = '收缩菜单';
                label.textContent = '收缩菜单';
                icon.innerHTML = '<path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>';
            }
        }

        (function initSubMenu() {
            var group = document.getElementById('menuGroupMemory');
            if (!group) return;
            var expanded = localStorage.getItem('menuGroupMemory_expanded');
            if (expanded === 'true' || expanded === null) {
                group.classList.add('expanded');
            }
        })();

        function toggleMenuSub(groupId) {
            var group = document.getElementById(groupId);
            if (!group) return;
            var menu = document.getElementById('mainMenu');
            if (menu && menu.classList.contains('collapsed')) {
                group.classList.toggle('popup-visible');
                return;
            }
            group.classList.toggle('expanded');

            if (group.classList.contains('expanded')) {
                try { localStorage.setItem(groupId + '_expanded', 'true'); } catch(e) {}
            } else {
                try { localStorage.setItem(groupId + '_expanded', 'false'); } catch(e) {}
            }
        }

        (function initCollapsedPopup() {
            var menu = document.getElementById('mainMenu');
            if (!menu) return;
            var groups = menu.querySelectorAll('.menu-group');
            groups.forEach(function(group) {
                var parentBtn = group.querySelector('.menu-parent-btn');
                if (!parentBtn) return;
                var hideTimer = null;

                function cancelHide() {
                    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
                }

                function showPopup() {
                    if (!menu.classList.contains('collapsed')) return;
                    cancelHide();
                    var items = group.querySelector('.menu-sub-items');
                    if (!items) return;
                    var rect = parentBtn.getBoundingClientRect();
                    items.style.top = rect.top + 'px';
                    items.style.left = (rect.right + 4) + 'px';
                    group.classList.add('popup-visible');
                }

                function hidePopup() {
                    cancelHide();
                    hideTimer = setTimeout(function() {
                        group.classList.remove('popup-visible');
                    }, 180);
                }

                parentBtn.addEventListener('mouseenter', showPopup);
                parentBtn.addEventListener('mouseleave', hidePopup);
                group.querySelector('.menu-sub-items').addEventListener('mouseenter', showPopup);
                group.querySelector('.menu-sub-items').addEventListener('mouseleave', hidePopup);
            });
        })();
    </script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/toast.js}"></script>
    <script th:src="@{/js/modal.js}"></script>
    <script th:src="@{/js/confirm-dialog.js}"></script>
    <th:block layout:fragment="extraScripts"></th:block>
</body>
</html>
