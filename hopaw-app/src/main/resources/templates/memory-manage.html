<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>记忆管理 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">🤖 HoPaw - 记忆管理</div>

<main layout:fragment="content" class="memory-manage-container">
    <div class="toolbar">
        <button class="btn btn-primary" onclick="loadTree()">刷新</button>
    </div>
    <div class="memory-panels">
        <div class="tree-panel">
            <div class="panel-header">
                记忆树
                <button class="btn btn-sm btn-primary" onclick="addRootMemory()">+ 添加记忆</button>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="empty-state">暂无记忆数据</div>
            </div>
        </div>
        <div class="editor-panel">
            <div class="panel-header">记忆详情</div>
            <div class="editor-content" id="editorContent">
                <div class="empty-state">请在左侧选择一条记忆</div>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/memory-manage.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/page/memory-manage.js}"></script>
</th:block>
</body>
</html>
