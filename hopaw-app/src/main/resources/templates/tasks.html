<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>定时任务管理 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">🤖 HoPaw - 定时任务管理</div>

<main layout:fragment="content" class="tasks-container">
    <div class="tasks-header">
        <h2>定时任务管理</h2>
    </div>

    <div class="tasks-card">
        <table class="tasks-table">
            <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>Cron 表达式</th>
                    <th>状态</th>
                    <th>创建者</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody">
            </tbody>
        </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <p>暂无定时任务，点击"添加任务"按钮开始创建</p>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加任务</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskName">任务名称 *</label>
                        <input type="text" id="taskName" required placeholder="例如：日志测试">
                    </div>
                    <div class="form-group">
                        <label for="taskType">任务类型 *</label>
                        <select id="taskType" required onchange="onTaskTypeChange()">
                            <option value="">选择任务类型</option>
                            <option value="memory_organize">记忆整理</option>
                            <option value="agent_task">智能体任务</option>
                        </select>
                    </div>
                    <div id="agentTaskFields" style="display:none;">
                        <div class="form-group">
                            <label for="agentSelect">选择智能体 *</label>
                            <select id="agentSelect">
                                <option value="">选择智能体</option>
                                <option th:each="agent : ${agents}" th:value="${agent.id}" th:text="${agent.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="taskCron">Cron 表达式 *</label>
                        <input type="text" id="taskCron" required placeholder="0 0 * * * *">
                        <small class="form-help">格式: 秒 分 时 日 月 周 (例: 0 0 * * * * 表示每小时)</small>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <label class="switch">
                            <input type="checkbox" id="taskEnabled" checked>
                            <span class="slider"></span>
                        </label>
                        <span id="taskStatusLabel">启用</span>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/tasks.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/tasks.js}"></script>
</th:block>
</body>
</html>
