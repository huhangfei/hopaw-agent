<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layouts/default}">
<head>
    <title>Token 用量统计 - HoPaw</title>
</head>
<body>
<div layout:fragment="pageTitle">🤖 HoPaw - Token 用量统计</div>

<main layout:fragment="content" class="usage-container">
    <div class="usage-header">
        <h2>Token 用量统计</h2>
    </div>

    <div class="filter-card">
        <div class="filter-row">
            <div class="filter-group">
                <label for="startTime">开始时间</label>
                <input type="datetime-local" id="startTime">
            </div>
            <div class="filter-group">
                <label for="endTime">结束时间</label>
                <input type="datetime-local" id="endTime">
            </div>
            <div class="filter-group">
                <label for="filterUser">用户</label>
                <select id="filterUser">
                    <option value="">全部</option>
                    <option value="user1">user1</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterAgent">智能体</label>
                <select id="filterAgent">
                    <option value="">全部</option>
                    <option th:each="a : ${agents}" th:value="${a.id}" th:text="${a.name}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterModel">模型名称</label>
                <input type="text" id="filterModel" placeholder="例如: claude-opus-4-7">
            </div>
            <div class="filter-group">
                <label for="filterSource">来源</label>
                <select id="filterSource">
                    <option value="">全部</option>
                    <option value="chat">会话</option>
                    <option value="model-test">模型测试</option>
                    <option value="memory-organize">记忆整理</option>
                    <option value="agentTask">智能体定时任务</option>
                </select>
            </div>
            <div class="filter-group">
                <label>&nbsp;</label>
                <button class="btn btn-primary" onclick="query()">查询</button>
                <button class="btn btn-secondary" onclick="reset()">重置</button>
            </div>
        </div>
    </div>

    <div class="summary-cards">
        <div class="summary-card">
            <div class="summary-label">总请求数</div>
            <div class="summary-value" id="totalRequests">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">总输入 Token</div>
            <div class="summary-value" id="totalInputTokens">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">总输出 Token</div>
            <div class="summary-value" id="totalOutputTokens">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">总费用</div>
            <div class="summary-value" id="totalCost">-</div>
        </div>
    </div>

    <div class="table-card">
        <table class="data-table" id="usageTable">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>用户</th>
                    <th>智能体</th>
                    <th>模型</th>
                    <th>来源</th>
                    <th>输入 Tokens</th>
                    <th>输出 Tokens</th>
                    <th>费用</th>
                </tr>
            </thead>
            <tbody id="usageTableBody">
            </tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
</main>

<th:block layout:fragment="extraCss">
    <link rel="stylesheet" th:href="@{/css/page/token-usage.css}">
</th:block>

<th:block layout:fragment="extraScripts">
    <script th:src="@{/js/token-usage.js}"></script>
</th:block>
</body>
</html>
